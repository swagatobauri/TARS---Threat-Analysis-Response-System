version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tars_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-TARS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-TARS}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tars_network

  redis:
    image: redis:7-alpine
    container_name: tars_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tars_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: tars_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tars_network

  celery_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: tars_celery_worker
    restart: always
    command: celery -A celery_worker.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tars_network

  celery_beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: tars_celery_beat
    restart: always
    command: celery -A celery_worker.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tars_network

  tars_metrics_worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: tars_metrics_worker
    restart: always
    command: celery -A celery_worker.celery_app worker -Q metrics -c 1 --loglevel=info
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tars_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: tars_frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - tars_network

volumes:
  postgres_data:
  redis_data:

networks:
  tars_network:
    driver: bridge
